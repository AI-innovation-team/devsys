# devsys 部署拓扑（非机密，可提交）。机密放 .env。
# 改这里 + .env，然后 ./deploy.sh 一键部署。
# 架构：用户 → relay(公网,纯转发) → 反向隧道 → gateway(内网,跑门户) → 各内网 server。

# ── 对外访问 ──
domain: coder.psyagent.top          # 用户访问域名（A 记录指向 relay 公网 IP）
public_port: 8443                   # 对外端口（备案后可改 443）
acme_email: guohao2045@gmail.com    # Let's Encrypt 通知邮箱

# Caddy 容器访问外网用的代理（签证书需要）。留空=直连。
container_proxy: http://host.docker.internal:7890

# ── 证书 DNS-01 验证 ──
# provider: 内置支持 alidns / cloudflare / dnspod（凭据变量名见 .env.example）。
#           其它服务商：改 module + 在 deploy/gateway 说明里加对应 Caddy dns 块。
# module:   xcaddy 编译进 Caddy 的插件（github.com/caddy-dns/*）。
dns:
  provider: alidns
  module: github.com/caddy-dns/alidns

# ── 登录：GitHub OAuth，申请制白名单 ──
# client_id / client_secret 放 .env；这里只列非机密的白名单用户名。
oauth:
  provider: github
  github_users: [colehank, GongZhengxin, YaozeLiu0417]

# ── 公网中继（任意公网服务器）──
# ssh:  部署用 SSH 目标（~/.ssh/config 别名，或 user@host）
# user: 中继上的隧道专用账号（deploy 会创建）
# host: gateway 反向隧道要连的公网地址
relay:
  ssh: aliyun
  user: relay
  host: 39.97.7.248
  port: 22

# ── 网关（一台稳定内网机，跑门户，同时是 bastion）──
# ssh:  部署用 SSH 目标；user/home: 门户以该账号运行、文件放该 home 下
gateway:
  ssh: turing
  user: zzl-zgh
  home: /nfs/t1/userhome/zzl-zgh

# ── 内网服务器清单（门户里列出，供 SSH / VS Code / 工作区）──
# host/port: 内网地址与 SSH 端口
# jump:      可选。空=从 gateway 直连；填另一台 server 的 name=经它 ProxyJump。
servers:
  - { name: turing, host: 172.16.185.103, port: 22 }
  - { name: lecun,  host: 172.18.137.34,  port: 22 }
  - { name: hinton, host: 172.16.185.96,  port: 80 }
  # 示例：某台只能经 turing 跳板：
  # - { name: far, host: 10.0.0.9, port: 22, jump: turing }
