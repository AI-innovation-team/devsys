# 角色：control-plane —— 跑在「任意一台稳定的内网机器」上。
# 内容：Coder Server + Postgres + Caddy(TLS)。所有站点相关值来自 .env，不写死。
services:
  coder:
    image: ghcr.io/coder/coder:latest
    restart: unless-stopped
    env_file: .env
    environment:
      CODER_PG_CONNECTION_URL: "postgresql://coder:${POSTGRES_PASSWORD}@db/coder?sslmode=disable"
      CODER_HTTP_ADDRESS: "0.0.0.0:7080"
      CODER_ACCESS_URL: "https://${DEV_DOMAIN}:${PUBLIC_PORT}"
      CODER_PROVISIONER_DAEMON_PSK: "${PROVISIONER_PSK}"
      CODER_TELEMETRY_ENABLE: "false"
      # 覆盖 config.json 注入的坏代理；内部服务(db/coder/自身)走直连
      HTTP_PROXY: "${CONTAINER_PROXY:-}"
      HTTPS_PROXY: "${CONTAINER_PROXY:-}"
      NO_PROXY: "localhost,127.0.0.1,coder,db,${DEV_DOMAIN}"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    # 内置置备器在本机 Docker 上建工作区容器（Coder OSS 无外部置备器）
    group_add:
      - "${DOCKER_GID}"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    depends_on:
      db:
        condition: service_healthy
    networks: [web]

  db:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_USER: coder
      POSTGRES_PASSWORD: "${POSTGRES_PASSWORD}"
      POSTGRES_DB: coder
    volumes:
      - coder_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U coder"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks: [web]

  caddy:
    build:
      context: ./caddy
      args:
        CADDY_DNS_MODULE: "${CADDY_DNS_MODULE}"   # 按 config.yaml 选 DNS 插件
        # 覆盖宿主 ~/.docker/config.json 注入的代理（容器内无 127.0.0.1:7890，
        # goproxy.cn 直连即可）。留空即禁用构建期代理。
        HTTP_PROXY: ""
        HTTPS_PROXY: ""
        http_proxy: ""
        https_proxy: ""
    restart: unless-stopped
    # 在本机监听 PUBLIC_PORT；公网中继通过反向隧道把流量转到这里
    ports:
      - "${PUBLIC_PORT}:${PUBLIC_PORT}"
    # 把 .env 全部注入容器：DEV_DOMAIN/PUBLIC_PORT/ACME_EMAIL/CADDY_DNS 供
    # Caddyfile 的 {$...} 替换，各 DNS 凭据供 {env....} 读取。换服务商无需改这里。
    env_file: .env
    # 运行期代理：容器走宿主的 mihomo（host.docker.internal→宿主网关）。
    # 覆盖 Docker 从 config.json 注入的 127.0.0.1:7890（容器内不可达）。
    # Caddy 签 Let's Encrypt 证书需要它。CONTAINER_PROXY 为空则不用代理。
    environment:
      HTTP_PROXY: "${CONTAINER_PROXY:-}"
      HTTPS_PROXY: "${CONTAINER_PROXY:-}"
      NO_PROXY: "localhost,127.0.0.1,coder,db"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on: [coder]
    networks: [web]

networks:
  web:

volumes:
  coder_pgdata:
  caddy_data:
  caddy_config:
