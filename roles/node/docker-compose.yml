# 角色：node —— 跑在「每一台内网开发机」上。
# Coder 外部置备器：拨出连到控制面 Coder Server，在本机 Docker 起用户容器。
# 加一台新机器 = 部署这个包 + 在 .env 里给它起个名字，无需改代码。
services:
  provisionerd:
    image: ghcr.io/coder/coder:latest
    restart: unless-stopped
    # 镜像 ENTRYPOINT 固定是 "/opt/coder server"，这里覆盖成外部置备器命令
    entrypoint: ["/opt/coder"]
    command: ["provisioner", "start"]
    user: root  # 需要访问宿主机 docker.sock
    env_file: .env
    # 把「域名」直接解析到控制面（同机=host-gateway；远程=控制面 LAN IP），
    # 绕开公网 hairpin，也让 Caddy 的域名证书照常校验通过。
    extra_hosts:
      - "${DEV_DOMAIN}:${CONTROL_PLANE_LAN}"
    environment:
      CODER_URL: "https://${DEV_DOMAIN}:${PUBLIC_PORT}"
      CODER_PROVISIONER_DAEMON_PSK: "${PROVISIONER_PSK}"
      # 机器名标签：模板的「机器」参数据此路由到对应机器
      CODER_PROVISIONERD_TAGS: "machine=${NODE_NAME}"
      # 直连控制面，不走容器注入的坏代理（127.0.0.1:7890 在容器内不可达）
      NO_PROXY: "${DEV_DOMAIN},localhost,127.0.0.1"
      no_proxy: "${DEV_DOMAIN},localhost,127.0.0.1"
      HTTP_PROXY: ""
      HTTPS_PROXY: ""
      http_proxy: ""
      https_proxy: ""
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
